name: Sync Website From Nodus Release

on:
  repository_dispatch:
    types:
      - nodus_release_published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing nodus release tag to sync
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.client_payload.tag_name }}

    steps:
      - name: Check out website repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || github.ref_name }}

      - name: Check out nodus release source
        uses: actions/checkout@v4
        with:
          repository: nodus-rs/nodus
          ref: ${{ env.RELEASE_TAG }}
          path: vendor/nodus

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release assets
        shell: bash
        run: |
          set -euo pipefail
          NODUS_SOURCE_DIR=vendor/nodus NODUS_RELEASE_TAG="${RELEASE_TAG}" npm run sync:release

      - name: Validate site
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Set up git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push website update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No website changes to commit."
            exit 0
          fi

          git add public/install.sh public/install.ps1 src/site-config.ts
          git commit -m "Sync website assets for ${RELEASE_TAG}"
          git push
